<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃 - 左右並排版</title>
    <style>
        :root {
            --wood-color: #5D4037;
            --drawer-bg: #D2B48C;
            --text-color: #3e2723;
        }
        body { 
            font-family: sans-serif; 
            background-color: #F7F3F0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .cabinet-container { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%;
            max-width: 1200px;
        }

        .cabinet-section { flex: 1; min-width: 300px; }
        h3 { color: var(--wood-color); text-align: center; border-bottom: 2px solid var(--wood-color); margin-bottom: 10px; font-size: 1.1rem; }

        .cabinet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 6px;
            background: var(--wood-color);
            padding: 8px;
            border-radius: 4px;
        }

        .drawer {
            background: var(--drawer-bg);
            /* 極致壓縮高度：寬高比改為 4:1 */
            aspect-ratio: 4 / 1; 
            display: flex;
            flex-direction: row; /* 關鍵：改為左右排列 */
            align-items: center;
            border: 1px solid #5d4037;
            cursor: pointer;
            overflow: hidden;
        }
        
        /* 數字部分：加大且靠左 */
        .drawer .id { 
            font-size: 1.2rem; 
            font-weight: 900;
            color: #5d4037;
            flex: 1; /* 佔比 1/3 */
            text-align: center;
            border-right: 1px solid rgba(93, 64, 55, 0.3);
            line-height: 1;
        }
        
        /* 名稱部分：加大且靠右 */
        .drawer .name { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
            flex: 2; /* 佔比 2/3 */
            text-align: center;
            line-height: 1;
        }
        
        .drawer.empty { background: #e0d7cc; cursor: default; }
        .drawer.empty .name { color: #999; }

        .back-btn { margin-top: 20px; padding: 8px 20px; background: #6B5B6B; color: white; text-decoration: none; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="cabinet-container" id="mainContainer"></div>
    <a href="index.html" class="back-btn">← 返回圖鑑主頁</a>

    <script src="data.js"></script>
    <script>
        const mainContainer = document.getElementById('mainContainer');
        // 確保 800 在左，700 在右
        const displayOrder = ["800", "700"];

        displayOrder.forEach(seriesKey => {
            if (!CABINET_DATA[seriesKey]) return;

            const section = document.createElement('div');
            section.className = 'cabinet-section';
            section.innerHTML = `<h3>${seriesKey} 系列</h3>`;

            const grid = document.createElement('div');
            grid.className = 'cabinet-grid';

            CABINET_DATA[seriesKey].forEach(layer => {
                const items = layer.items; 
                // 排序邏輯：上(0, 2) 下(1, 3)
                const customOrder = [0, 2, 1, 3];

                customOrder.forEach(idx => {
                    const item = items[idx];
                    if (!item) return;

                    const drawer = document.createElement('div');
                    drawer.className = 'drawer';
                    if (item.name === "無") drawer.classList.add('empty');
                    
                    drawer.innerHTML = `
                        <div class="id">${item.id}</div>
                        <div class="name">${item.name}</div>
                    `;

                    drawer.onclick = () => {
                        if (item.name !== "無") {
                            window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
                        }
                    };
                    grid.appendChild(drawer);
                });
            });

            section.appendChild(grid);
            mainContainer.appendChild(section);
        });
    </script>
</body>
</html>
