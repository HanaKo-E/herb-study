<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃佈局 - 極致壓縮版</title>
    <style>
        :root {
            --wood-color: #5D4037;
            --drawer-bg: #D2B48C;
            --text-color: #3e2723;
        }
        body { 
            font-family: sans-serif; 
            background-color: #F7F3F0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .cabinet-container { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%;
            max-width: 1200px;
        }

        .cabinet-section { flex: 1; min-width: 300px; }
        h3 { color: var(--wood-color); text-align: center; border-bottom: 2px solid var(--wood-color); margin-bottom: 10px; font-size: 1.1rem; }

        .cabinet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 6px;
            background: var(--wood-color);
            padding: 8px;
            border-radius: 4px;
        }

        .drawer {
            background: var(--drawer-bg);
            /* 關鍵：極致扁平化 */
            aspect-ratio: 4 / 1; 
            display: flex;
            flex-direction: row; /* 左右排列 */
            justify-content: space-around;
            align-items: center;
            border: 1px solid #5d4037;
            cursor: pointer;
            padding: 0 5px;
        }
        
        /* 數字加大 */
        .drawer .id { 
            font-size: 1.1rem; 
            font-weight: 800;
            color: #5d4037;
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(93, 64, 55, 0.2);
        }
        
        /* 文字加大 */
        .drawer .name { 
            font-size: 1.4rem; 
            font-weight: bold; 
            color: var(--text-color); 
            flex: 2;
            text-align: center;
            padding-left: 4px;
        }
        
        .drawer.empty { background: #e0d7cc; cursor: default; }
        .drawer.empty .name { color: #999; }

        .back-btn { 
            margin-top: 20px; 
            padding: 10px 25px; 
            background: #6B5B6B; 
            color: white; 
            text-decoration: none; 
            border-radius: 20px; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="cabinet-container" id="mainContainer"></div>
    <a href="index.html" class="back-btn">← 返回圖鑑主頁</a>

    <script src="data.js"></script>
    <script>
        const mainContainer = document.getElementById('mainContainer');
        const displayOrder = ["800", "700"];

        displayOrder.forEach(seriesKey => {
            if (!CABINET_DATA[seriesKey]) return;

            const section = document.createElement('div');
            section.className = 'cabinet-section';
            section.innerHTML = `<h3>${seriesKey} 系列</h3>`;

            const grid = document.createElement('div');
            grid.className = 'cabinet-grid';

            CABINET_DATA[seriesKey].forEach(layer => {
                const items = layer.items; 
                const customOrder = [0, 2, 1, 3]; // 達成 801|803, 802|804 排列

                customOrder.forEach(idx => {
                    const item = items[idx];
                    if (!item) return;

                    const drawer = document.createElement('div');
                    drawer.className = 'drawer';
                    if (item.name === "無") drawer.classList.add('empty');
                    
                    drawer.innerHTML = `
                        <div class="id">${item.id}</div>
                        <div class="name">${item.name}</div>
                    `;

                    drawer.onclick = () => {
                        if (item.name !== "無") {
                            window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
                        }
                    };
                    grid.appendChild(drawer);
                });
            });

            section.appendChild(grid);
            mainContainer.appendChild(section);
        });
    </script>
</body>
</html>
