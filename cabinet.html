<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃配置圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #6B5B6B;
            --bg-color: #F7F3F0;
        }
        body { background-color: var(--bg-color); font-family: "PingFang TC", sans-serif; }
        .cabinet-container {
            background: #fff;
            border: 8px solid #8B735B;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .drawer {
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            background: #fafafa;
        }
        .drawer:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .medicine-tag {
            font-size: 0.85rem;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .medicine-tag:hover { background: #fee2e2; color: #991b1b; }
        .code-num { font-weight: bold; color: #64748b; min-width: 25px; }
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(107, 91, 107, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="pb-12">

    <!-- 頂部導覽 -->
    <nav class="nav-bar text-white p-4 shadow-md mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest">實體百子櫃對照</h1>
            <button onclick="location.href='index.html'" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">
                返回學習圖鑑
            </button>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-4xl">
        
        <!-- 左側櫃子區塊 (800系列) -->
        <div id="section-800" class="mb-12">
            <h2 class="text-2xl font-bold text-gray-700 mb-4 border-l-4 border-amber-700 pl-3">左側百子櫃 (800 系列)</h2>
            <div id="left-cabinet-root" class="cabinet-container p-4">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

        <!-- 右側櫃子區塊 (700系列) -->
        <div id="section-700" class="mb-12">
            <h2 class="text-2xl font-bold text-gray-700 mb-4 border-l-4 border-amber-700 pl-3">右側百子櫃 (700 系列)</h2>
            <div id="right-cabinet-root" class="cabinet-container p-4">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

    </div>

    <!-- 引用資料檔案 -->
    <script src="data.js"></script>
    <script>
        // 渲染單個櫃子的邏輯
        function renderCabinet(seriesKey, targetId) {
            const container = document.getElementById(targetId);
            const data = MEDICINE_DATABASE[seriesKey];
            
            if (!data) {
                container.innerHTML = `<p class="text-gray-400 p-4">暫無 ${seriesKey} 系列資料</p>`;
                return;
            }

            container.innerHTML = data.map(layer => `
                <div class="mb-6">
                    <div class="text-xs font-bold text-amber-800 mb-2 bg-amber-50 inline-block px-2 py-1 rounded">${layer.layer}</div>
                    <div class="drawer p-4 rounded-xl shadow-sm">
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                            ${layer.items.map(item => `
                                <div class="medicine-tag" onclick="goToGallery('${item.name}')">
                                    <span class="code-num">${item.code}</span>
                                    <span class="font-medium text-gray-800">${item.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 跳轉至圖鑑並搜尋
        function goToGallery(name) {
            // 如果你有 gallery.html，則跳轉並帶參數；若無，可改為跳回 index.html
            location.href = `gallery.html?search=${encodeURIComponent(name)}`;
        }

        // 頁面啟動邏輯
        window.onload = () => {
            // 1. 執行渲染
            renderCabinet("800", "left-cabinet-root");
            renderCabinet("700", "right-cabinet-root");

            // 2. 偵測 URL 參數進行自動定位
            const params = new URLSearchParams(window.location.search);
            const side = params.get('side');

            if (side === '800') {
                document.getElementById('section-800').scrollIntoView({ behavior: 'smooth' });
            } else if (side === '700') {
                document.getElementById('section-700').scrollIntoView({ behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>
