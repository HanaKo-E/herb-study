<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃佈局</title>
    <style>
        :root {
            --wood-color: #8B4513;
            --drawer-bg: #D2B48C;
            --text-color: #3e2723;
        }
        body { font-family: sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: var(--wood-color); }
        .cabinet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: var(--wood-color);
            padding: 15px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
        }
        .drawer {
            background: var(--drawer-bg);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #5d4037;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .drawer:active { transform: scale(0.95); background: #c19a6b; }
        .drawer .id { font-size: 0.7rem; color: #5d4037; }
        .drawer .name { font-size: 1rem; font-weight: bold; color: var(--text-color); }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: var(--wood-color); color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>百子櫃 (800系列)</h2>
    <div id="cabinetDisplay" class="cabinet-grid"></div>

    <a href="index.html" class="back-btn">返回圖鑑</a>

    <!-- 必須引入 data.js 才能讀取藥材清單 -->
    <script src="data.js"></script>
    <script>
        // 渲染櫃位的邏輯
        const display = document.getElementById('cabinetDisplay');
        
        // 抓取 800 系列的所有層級並展開成單一清單
        const allItems = CABINET_DATA["800"].flatMap(layer => layer.items);

        allItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'drawer';
            div.innerHTML = `<span class="id">${item.id}</span><span class="name">${item.name}</span>`;
            
            // 點擊後跳轉回首頁，並附帶搜尋參數
            div.onclick = () => {
                if (item.name !== "無" && item.name !== "熟地") {
                    window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
                }
            };
            display.appendChild(div);
        });
    </script>
</body>
</html>
