<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃佈局 - 800系列居左</title>
    <style>
        :root {
            --wood-color: #5D4037;
            --drawer-bg: #D2B48C;
            --text-color: #3e2723;
        }
        body { 
            font-family: sans-serif; 
            background-color: #F7F3F0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* 確保櫃子由左至右排列 */
        .cabinet-container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%;
            max-width: 1200px;
        }

        .cabinet-section { 
            flex: 1; 
            min-width: 320px; 
        }

        h3 { 
            color: var(--wood-color); 
            text-align: center; 
            border-bottom: 2px solid var(--wood-color); 
            margin-bottom: 15px;
        }

        .cabinet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px;
            background: var(--wood-color);
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .drawer {
            background: var(--drawer-bg);
            aspect-ratio: 3 / 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #5d4037;
            cursor: pointer;
            transition: background 0.2s;
        }
        .drawer:active { background: #c19a6b; }
        
        .drawer .id { font-size: 0.75rem; color: #5d4037; opacity: 0.8; }
        
        .drawer .name { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
        }
        
        .drawer.empty { background: #e0d7cc; cursor: default; }
        .drawer.empty .name { color: #999; }

        .back-btn { 
            margin-top: 30px; 
            padding: 12px 30px; 
            background: #6B5B6B; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="cabinet-container" id="mainContainer">
        <!-- JS 將依序在此生成 800 與 700 櫃位 -->
    </div>

    <a href="index.html" class="back-btn">← 返回圖鑑主頁</a>

    <script src="data.js"></script>
    <script>
        const mainContainer = document.getElementById('mainContainer');

        // 指定顯示順序，確保 800 在左，700 在右
        const displayOrder = ["800", "700"];

        displayOrder.forEach(seriesKey => {
            if (!CABINET_DATA[seriesKey]) return;

            const section = document.createElement('div');
            section.className = 'cabinet-section';
            section.innerHTML = `<h3>${seriesKey} 系列</h3>`;

            const grid = document.createElement('div');
            grid.className = 'cabinet-grid';

            CABINET_DATA[seriesKey].forEach(layer => {
                const items = layer.items; 

                // 排序邏輯：
                // 第一排呈現 items[0] | items[2] (例如 801 | 803)
                // 第二排呈現 items[1] | items[3] (例如 802 | 804)
                const customOrder = [0, 2, 1, 3];

                customOrder.forEach(idx => {
                    const item = items[idx];
                    if (!item) return;

                    const drawer = document.createElement('div');
                    drawer.className = 'drawer';
                    if (item.name === "無") drawer.classList.add('empty');
                    
                    drawer.innerHTML = `
                        <span class="id">${item.id}</span>
                        <span class="name">${item.name}</span>
                    `;

                    drawer.onclick = () => {
                        if (item.name !== "無") {
                            window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
                        }
                    };
                    grid.appendChild(drawer);
                });
            });

            section.appendChild(grid);
            mainContainer.appendChild(section);
        });
    </script>
</body>
</html>
