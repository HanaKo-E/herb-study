<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃佈局優化</title>
    <style>
        :root {
            --wood-color: #5D4037;
            --text-white: #ffffff;
            --main-bg: #F7F3F0;
        }
        body { 
            font-family: sans-serif; 
            background-color: var(--main-bg); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1.main-title {
            color: var(--wood-color);
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 3px solid var(--wood-color);
            padding-bottom: 10px;
        }
        
        .cabinet-container { 
            display: flex; 
            flex-direction: row; 
            gap: 25px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%;
            max-width: 1200px;
        }

        .cabinet-section { flex: 1; min-width: 320px; }
        
        h3.series-title { 
            color: var(--wood-color); 
            text-align: center; 
            background: rgba(93, 64, 55, 0.1);
            padding: 5px;
            border-radius: 5px;
        }

        /* 每 4 格為一組的格子櫃容器 */
        .lattice-unit {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .drawer {
            background: rgba(255, 255, 255, 0.15); /* 半透明疊加在背景色上 */
            aspect-ratio: 4 / 1; 
            display: flex;
            flex-direction: row; 
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-white);
        }
        
        .drawer .id { 
            font-size: 1.1rem; 
            font-weight: 900;
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .drawer .name { 
            font-size: 1.4rem; 
            font-weight: bold; 
            flex: 2;
            text-align: center;
        }
        
        .drawer.empty { opacity: 0.5; cursor: default; }

        .back-btn { margin-top: 30px; padding: 10px 25px; background: #6B5B6B; color: white; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>

    <h1 class="main-title">百子櫃佈局</h1>

    <div class="cabinet-container" id="mainContainer"></div>

    <a href="index.html" class="back-btn">← 返回圖鑑主頁</a>

    <script src="data.js"></script>
    <script>
        const mainContainer = document.getElementById('mainContainer');
        const displayOrder = ["800", "700"];
        
        // 定義漸變色碼
        const colorCodes = [
            "#31483c", "#3e564b", "#4b645a", "#587269", 
            "#658078", "#728e87", "#7f9c96", "#8caaa5", "#99b9b4"
        ];

        let globalUnitIndex = 0; // 用於追蹤所有格子櫃的配色索引

        displayOrder.forEach(seriesKey => {
            if (!CABINET_DATA[seriesKey]) return;

            const section = document.createElement('div');
            section.className = 'cabinet-section';
            section.innerHTML = `<h3 class="series-title">${seriesKey} 系列</h3>`;

            CABINET_DATA[seriesKey].forEach((layer) => {
                // 為每一層（4格）建立一個獨立的格子櫃容器
                const lattice = document.createElement('div');
                lattice.className = 'lattice-unit';
                
                // 分配漸變色，若超過顏色陣列長度則循環使用
                const bgColor = colorCodes[globalUnitIndex % colorCodes.length];
                lattice.style.backgroundColor = bgColor;
                globalUnitIndex++;

                const items = layer.items; 
                const customOrder = [0, 2, 1, 3]; // 交錯排序邏輯

                customOrder.forEach(idx => {
                    const item = items[idx];
                    if (!item) return;

                    const drawer = document.createElement('div');
                    drawer.className = 'drawer';
                    if (item.name === "無") drawer.classList.add('empty');
                    
                    drawer.innerHTML = `
                        <div class="id">${item.id}</div>
                        <div class="name">${item.name}</div>
                    `;

                    drawer.onclick = () => {
                        if (item.name !== "無") {
                            window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
                        }
                    };
                    lattice.appendChild(drawer);
                });
                
                section.appendChild(lattice);
            });

            mainContainer.appendChild(section);
        });
    </script>
</body>
</html>
