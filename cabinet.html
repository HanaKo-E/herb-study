<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃配置圖</title>
    <style>
        :root {
            --primary-color: #6B5B6B;
            --cabinet-bg: #D2B48C; /* 木質色 */
            --drawer-bg: #F5DEB3;
            --text-dark: #3E2723;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #F7F3F0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .back-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        .cabinet-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .side-section {
            background: #8B4513;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .side-title {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .grid-cabinet {
            display: grid;
            grid-template-columns: repeat(2, 120px); /* 每層兩格雙藥材，對應你的資料結構 */
            grid-gap: 8px;
        }

        .drawer {
            background-color: var(--drawer-bg);
            height: 80px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid #A0522D;
            transition: transform 0.1s;
        }

        .drawer:active {
            transform: scale(0.95);
            background-color: #EEDC82;
        }

        .drawer-num {
            font-size: 0.7rem;
            color: #8B4513;
            margin-bottom: 5px;
        }

        .med-name {
            font-weight: bold;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .empty {
            color: #A0522D;
            font-style: italic;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .grid-cabinet {
                grid-template-columns: repeat(2, 100px);
            }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">返回圖鑑</a>
    <div style="font-size: 1.2rem; font-weight: bold;">百子櫃配置圖</div>
</header>

<div class="cabinet-container">
    <!-- 左側櫃子 -->
    <div class="side-section">
        <div class="side-title">左側櫃子 (8區)</div>
        <div id="leftCabinet" class="grid-cabinet"></div>
    </div>

    <!-- 右側櫃子 -->
    <div class="side-section">
        <div class="side-title">右側櫃子 (7區)</div>
        <div id="rightCabinet" class="grid-cabinet"></div>
    </div>
</div>

<script>
    // 資料結構：根據你的描述編寫
    const leftData = [
        {id: "801", name: "山藥"}, {id: "803", name: "金銀花"},
        {id: "802", name: "連翹"}, {id: "804", name: "桃仁"},
        {id: "805", name: "赤芍"}, {id: "807", name: "牡丹皮"},
        {id: "806", name: "細辛"}, {id: "808", name: "黃芪"},
        {id: "809", name: "桔梗"}, {id: "811", name: "蘆根"},
        {id: "810", name: "竹葉"}, {id: "812", name: "淡豆豉"},
        {id: "813", name: "紫蘇"}, {id: "815", name: "生地黃"},
        {id: "814", name: "牡蠣"}, {id: "816", name: "甘草"},
        {id: "817", name: "牛膝"}, {id: "819", name: "前胡"},
        {id: "818", name: "牛蒡子"}, {id: "無", name: "熟地"},
        {id: "820", name: "澤瀉"}, {id: "無", name: "黨參"},
        {id: "821", name: "陳皮"}, {id: "無", name: "菊花"}
    ];

    const rightData = [
        {id: "701", name: "當歸"}, {id: "703", name: "炙甘草"},
        {id: "702", name: "獨活"}, {id: "704", name: "川芎"},
        {id: "705", name: "白芷"}, {id: "707", name: "荊芥"},
        {id: "706", name: "柴胡"}, {id: "708", name: "白芍"},
        {id: "709", name: "生薑"}, {id: "711", name: "大棗"},
        {id: "710", name: "茯苓"}, {id: "712", name: "茶葉"},
        {id: "713", name: "薄荷"}, {id: "715", name: "防風"},
        {id: "714", name: "枳殼"}, {id: "716", name: "土茯苓"},
        {id: "717", name: "山茱萸"}, {id: "719", name: "北杏"},
        {id: "718", name: "製半夏"}, {id: "720", name: "紅花"},
        {id: "721", name: "香附"}, {id: "723", name: "肉桂皮"},
        {id: "722", name: "薑活"}, {id: "724", name: "附子"}
    ];

    function renderCabinet(containerId, data) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const drawer = document.createElement('div');
            drawer.className = 'drawer';
            // 點擊事件：跳轉回圖鑑並傳入藥材名稱
            drawer.onclick = () => {
                window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
            };

            drawer.innerHTML = `
                <div class="drawer-num">${item.id}</div>
                <div class="med-name">${item.name}</div>
            `;
            container.appendChild(drawer);
        });
    }

    // 執行渲染
    renderCabinet('leftCabinet', leftData);
    renderCabinet('rightCabinet', rightData);
</script>

</body>
</html>
