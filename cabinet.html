<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃佈局 - 雙色優化版</title>
    <style>
        :root {
            --text-white: #ffffff;
            --main-bg: #F7F3F0;
            --title-color: #5D4037;
        }
        body { 
            font-family: sans-serif; 
            background-color: var(--main-bg); 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1.main-title {
            color: var(--title-color);
            margin: 10px 0 20px 0;
            font-size: 1.8rem;
            border-bottom: 3px solid var(--title-color);
            padding-bottom: 5px;
        }
        
        .cabinet-container { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%;
            max-width: 1200px;
        }

        .cabinet-section { flex: 1; min-width: 320px; }
        
        .series-heading {
            text-align: center;
            color: var(--title-color);
            background: rgba(93, 64, 55, 0.1);
            padding: 5px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .lattice-unit {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 5px;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .drawer {
            background: rgba(255, 255, 255, 0.15); 
            aspect-ratio: 5 / 1; 
            display: flex;
            flex-direction: row; 
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            color: var(--text-white);
            cursor: default; 
        }
        
        .drawer .id { 
            font-size: 1.1rem; 
            font-weight: 900;
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            line-height: 1;
        }
        
        .drawer .name { 
            font-size: 1.3rem; 
            font-weight: bold; 
            flex: 2;
            text-align: center;
            line-height: 1;
        }
        
        .drawer.empty { opacity: 0.3; }

        .footer-nav { margin-top: 20px; }
        .back-link { 
            padding: 8px 20px; 
            background: #6B5B6B; 
            color: white; 
            text-decoration: none; 
            border-radius: 20px; 
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <h1 class="main-title">百子櫃佈局</h1>

    <div class="cabinet-container" id="mainContainer"></div>

    <div class="footer-nav">
        <a href="index.html" class="back-link">← 返回主頁</a>
    </div>

    <script src="data.js"></script>
    <script>
        const mainContainer = document.getElementById('mainContainer');
        const displayOrder = ["800", "700"];

        // 800 系列綠色系
        const greenColors = ["#31483c", "#4b645a", "#587269", "#658078", "#728e87", "#7f9c96"];
        // 700 系列藍色系
        const blueColors = ["#313c48", "#4b5a64", "#586972", "#657880", "#72878e", "#7f969c"];

        displayOrder.forEach(seriesKey => {
            if (!CABINET_DATA[seriesKey]) return;

            const section = document.createElement('div');
            section.className = 'cabinet-section';
            section.innerHTML = `<div class="series-heading">${seriesKey} 系列</div>`;

            // 根據系列選擇對應顏色陣列
            const currentPalette = (seriesKey === "700") ? blueColors : greenColors;
            let colorIndex = 0; 

            CABINET_DATA[seriesKey].forEach((layer) => {
                const lattice = document.createElement('div');
                lattice.className = 'lattice-unit';
                
                // 套用對應系列的漸變色
                lattice.style.backgroundColor = currentPalette[colorIndex % currentPalette.length];
                colorIndex++;

                const items = layer.items; 
                const customOrder = [0, 2, 1, 3];

                customOrder.forEach(idx => {
                    const item = items[idx];
                    if (!item) return;

                    const drawer = document.createElement('div');
                    drawer.className = 'drawer';
                    if (item.name === "無") drawer.classList.add('empty');
                    
                    drawer.innerHTML = `
                        <div class="id">${item.id}</div>
                        <div class="name">${item.name}</div>
                    `;

                    lattice.appendChild(drawer);
                });
                
                section.appendChild(lattice);
            });

            mainContainer.appendChild(section);
        });
    </script>
</body>
</html>
