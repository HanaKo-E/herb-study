<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百子櫃 - 700系列</title>
    <style>
        :root { --text-white: #ffffff; --main-bg: #F7F3F0; --title-color: #5D4037; --btn-color: #4b5a64; }
        body { font-family: sans-serif; background-color: var(--main-bg); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .cabinet-section { width: 100%; max-width: 500px; }
        .series-heading { text-align: center; color: var(--title-color); background: rgba(93, 64, 55, 0.1); padding: 8px; border-radius: 6px; margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
        .lattice-unit { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 8px; margin-bottom: 8px; border-radius: 8px; }
        .drawer { background: rgba(255, 255, 255, 0.15); aspect-ratio: 5 / 1; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 4px; color: var(--text-white); text-decoration: none; }
        .drawer .id { font-size: 1rem; font-weight: 900; flex: 1; text-align: center; border-right: 1px solid rgba(255, 255, 255, 0.3); }
        .drawer .name { font-size: 1.2rem; font-weight: bold; flex: 2; text-align: center; }
        .drawer.empty { opacity: 0.3; pointer-events: none; }
        .nav-footer { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 500px; }
        .nav-btn { flex: 1; text-align: center; padding: 12px; background: var(--btn-color); color: white; text-decoration: none; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="cabinet-section" id="container">
        <div class="series-heading">700 系列</div>
    </div>
    <div class="nav-footer">
        <a href="index.html" class="nav-btn">← 返回圖鑑</a>
        <a href="cabinet_800.html" class="nav-btn">切換 800 系 →</a>
    </div>
    <script src="data.js"></script>
    <script>
        const purpleColors = ["#423148", "#5a4b64", "#695872", "#786580", "#87728e", "#967f9c"];
        const container = document.getElementById('container');
        if (CABINET_DATA["700"]) {
            CABINET_DATA["700"].forEach((layer, i) => {
                const unit = document.createElement('div');
                unit.className = 'lattice-unit';
                unit.style.backgroundColor = blueColors[i % blueColors.length];
                [0, 2, 1, 3].forEach(idx => {
                    const item = layer.items[idx];
                    if (!item) return;
                    const a = document.createElement('a');
                    a.href = `index.html?search=${encodeURIComponent(item.name)}`;
                    a.className = `drawer ${item.name === "無" ? 'empty' : ''}`;
                    a.innerHTML = `<div class="id">${item.id}</div><div class="name">${item.name}</div>`;
                    unit.appendChild(a);
                });
                container.appendChild(unit);
            });
        }
    </script>
</body>
</html>
