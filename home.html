<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中藥學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 導入自定義顏色 */
        .bg-custom-left { background-color: #31483c; }
        .bg-custom-right { background-color: #587269; }
        
        body { 
            background-color: #f4f7f4; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full space-y-12">
        <!-- 標題區域 -->
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-[#31483c] tracking-widest uppercase">
                中藥學習系統
            </h1>
            <div class="h-1.5 w-24 bg-[#587269] mx-auto mt-4 rounded-full"></div>
        </header>

        <!-- 主要導覽按鈕區域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
            
            <!-- 左側：中藥學習圖鑑 -->
            <button onclick="location.href='index.html'" 
                    class="bg-custom-left aspect-square rounded-3xl shadow-2xl flex flex-col items-center justify-center group hover:opacity-90 transition-all transform active:scale-95">
                <div class="text-white text-center">
                    <span class="text-6xl mb-6 block">📖</span>
                    <span class="text-2xl font-bold tracking-widest">中藥學習圖鑑</span>
                </div>
            </button>

            <!-- 右側：百子櫃配置圖 -->
            <button onclick="location.href='cabinet.html'" 
                    class="bg-custom-right aspect-square rounded-3xl shadow-2xl flex flex-col items-center justify-center group hover:opacity-90 transition-all transform active:scale-95">
                <div class="text-white text-center">
                    <span class="text-6xl mb-6 block">🗄️</span>
                    <span class="text-2xl font-bold tracking-widest">百子櫃配置圖</span>
                </div>
            </button>

        </div>

        <!-- 頁尾版本提示 -->
        <p class="text-center text-stone-400 text-sm tracking-tighter">
            HERB LEARNING SYSTEM v3.0
        </p>
    </div>

</body>
</html>
