<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中藥學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 精確設定你要求的綠色系列 */
        .bg-custom-left { background-color: #31483c; }
        .bg-custom-right { background-color: #587269; }
        
        body { 
            background-color: #F3F4F1; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full space-y-12">
        <!-- 系統標題 -->
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-[#31483c] tracking-[0.2em] uppercase">
                中藥學習系統
            </h1>
            <div class="h-1.5 w-24 bg-[#587269] mx-auto mt-4 rounded-full"></div>
        </header>

        <!-- 導覽區域：左右兩大正方形按鈕 -->
        <div class="grid grid-cols-2 gap-8">
            
            <!-- 左側：中藥學習圖鑑 -->
            <button onclick="location.href='index.html'" 
                    class="bg-custom-left aspect-square rounded-[2rem] shadow-2xl flex flex-col items-center justify-center group hover:brightness-110 transition-all transform active:scale-95">
                <span class="text-6xl mb-6">📖</span>
                <span class="text-white text-2xl font-bold tracking-widest">中藥學習圖鑑</span>
            </button>

            <!-- 右側：百子櫃配置圖 -->
            <button onclick="location.href='cabinet.html'" 
                    class="bg-custom-right aspect-square rounded-[2rem] shadow-2xl flex flex-col items-center justify-center group hover:brightness-110 transition-all transform active:scale-95">
                <span class="text-6xl mb-6">🗄️</span>
                <span class="text-white text-2xl font-bold tracking-widest">百子櫃配置圖</span>
            </button>

        </div>
    </div>

</body>
</html>
