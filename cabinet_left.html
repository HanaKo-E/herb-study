<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>百子櫃 - 左側 (800)</title>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; text-align: center; padding: 20px; }
        .nav-bar { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 20px; background: #8b4513; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #a0522d; }
        .cabinet { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 600px; margin: 0 auto; background: #5d4037; padding: 15px; border-radius: 8px; }
        .drawer { background: #d7ccc8; padding: 15px; border: 2px solid #3e2723; cursor: pointer; transition: 0.3s; }
        .drawer:hover { background: #bcaaa4; }
        .num { display: block; font-size: 12px; color: #5d4037; }
        .name { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="btn">圖鑑</a>
    <a href="cabinet_right.html" class="btn">右側櫃 (700)</a>
</div>

<h2>左側櫃子 (800 系列)</h2>
<div id="leftCabinet" class="cabinet"></div>

<script src="data.js"></script>
<script>
    const container = document.getElementById('leftCabinet');
    // 只渲染 800 系列
    MEDICINE_DATABASE["800"].forEach(layer => {
        layer.items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'drawer';
            div.onclick = () => window.location.href = `index.html?search=${encodeURIComponent(item.name)}`;
            div.innerHTML = `<span class="num">${item.code}</span><span class="name">${item.name}</span>`;
            container.appendChild(div);
        });
    });
</script>
</body>
</html>
