let currentIndex = 0;

function updateUI() {
    const med = medicines[currentIndex];
    if (!med) return;

    document.getElementById('medName').innerText = med.name;
    document.getElementById('medProp').innerText = med.property;
    document.getElementById('medTox').innerText = med.toxicity;
    document.getElementById('medNature').innerText = med.nature;
    document.getElementById('medEffect').innerText = med.effect;
    document.getElementById('medUsage').innerText = med.usage || med.usge; 
    document.getElementById('medNotice').innerText = med.notice;
    
    document.getElementById('currentNum').innerText = (currentIndex + 1).toString().padStart(2, '0');
    document.getElementById('totalNum').innerText = medicines.length.toString().padStart(2, '0');

    const toxEl = document.getElementById('medTox');
    toxEl.className = 'answer hidden text-sm px-2';
    if (med.toxicity.includes('小毒')) toxEl.classList.add('tox-small');
    if (med.toxicity.includes('大毒')) toxEl.classList.add('tox-large');

    document.getElementById('medImage').src = encodeURIComponent(med.img);
    document.querySelectorAll('.answer').forEach(el => el.classList.add('hidden'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reveal(el) {
    const target = el.querySelector('.answer');
    if(target) target.classList.remove('hidden');
}

function changeMed(step) {
    currentIndex = (currentIndex + step + medicines.length) % medicines.length;
    updateUI();
}

function handleSearch() {
    const input = document.getElementById('searchInput').value.trim();
    const resultBox = document.getElementById('searchResult');
    resultBox.innerHTML = "";
    
    if (!input) { resultBox.classList.add('hidden'); return; }
    
    const filtered = medicines.map((m, i) => ({...m, idx: i})).filter(m => m.name.includes(input));
    
    filtered.forEach(m => {
        const div = document.createElement('div');
        div.className = 'p-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 text-sm text-[#31483c]';
        div.innerText = m.name;
        div.onclick = () => { 
            currentIndex = m.idx; 
            updateUI();
            resultBox.classList.add('hidden');
            document.getElementById('searchInput').value = ""; 
        };
        resultBox.appendChild(div);
    });
    
    if (filtered.length > 0) resultBox.classList.remove('hidden');
    else resultBox.classList.add('hidden');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('#searchInput')) {
        document.getElementById('searchResult').classList.add('hidden');
    }
});

window.onload = updateUI;
</script>
