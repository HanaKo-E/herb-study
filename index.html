<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中藥學習圖鑑 - 中藥學習系統</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --dark-green: #31483c; --sage-green: #587269; --bg-light: #F3F4F1; }
        body { background-color: var(--bg-light); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        .info-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .label { color: var(--sage-green); font-weight: bold; width: 85px; flex-shrink: 0; font-size: 0.875rem; }
        .value { color: #2D3A3A; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body class="pb-10">

    <!-- 頂部導覽欄 -->
    <nav class="bg-[#31483c] text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-widest text-center flex-grow">中 藥 學 習 圖 鑑</h1>
        <button onclick="location.href='home.html'" class="absolute left-4 bg-white/10 px-3 py-1 rounded-lg text-sm">返回</button>
    </nav>

    <div class="container mx-auto px-4 max-w-md mt-6">
        
        <!-- 搜尋與進度 -->
        <div class="flex justify-between items-center mb-6 gap-4">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋藥名..." 
                   class="border-none rounded-full px-5 py-2.5 w-full shadow-inner bg-white focus:ring-2 focus:ring-[#31483c] outline-none text-sm">
            <div id="counter" class="text-[#587269] font-mono font-bold whitespace-nowrap">01 / 59</div>
        </div>

        <!-- 圖片展示區 -->
        <div class="bg-white rounded-[2.5rem] p-4 mb-6 shadow-sm flex justify-center items-center overflow-hidden h-72 border-4 border-white">
            <img id="medImage" src="" alt="載入中..." class="max-h-full object-contain">
        </div>

        <!-- 詳細資訊卡片 -->
        <div class="info-card p-6 space-y-4 mb-8">
            <div class="flex border-b border-gray-100 pb-3">
                <span class="label">藥名</span>
                <span id="medName" class="value font-bold text-xl text-[#31483c]">---</span>
            </div>
            <div class="flex justify-between border-b border-gray-100 pb-3">
                <div class="flex items-center">
                    <span class="label">屬性</span>
                    <span id="medProperty" class="value">---</span>
                </div>
                <div class="flex items-center">
                    <span class="label" style="width: 50px;">毒性</span>
                    <span id="medToxicity" class="value">---</span>
                </div>
            </div>
            <div class="flex flex-col border-b border-gray-100 pb-3">
                <span class="label mb-1">性味歸經</span>
                <span id="medNature" class="value">---</span>
            </div>
            <div class="flex flex-col border-b border-gray-100 pb-3">
                <span class="label mb-1">功效</span>
                <span id="medEffect" class="value">---</span>
            </div>
            <div class="flex flex-col border-b border-gray-100 pb-3">
                <span class="label mb-1">用法用量</span>
                <span id="medUsage" class="value">---</span>
            </div>
            <div class="flex flex-col">
                <span class="label mb-1">使用注意</span>
                <span id="medNotice" class="value text-red-800 italic">---</span>
            </div>
        </div>

        <!-- 主切換按鈕 -->
        <div class="grid grid-cols-2 gap-4 mb-10">
            <button onclick="prevMed()" class="bg-[#31483c] text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">上一個</button>
            <button onclick="nextMed()" class="bg-[#31483c] text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">下一個</button>
        </div>

        <!-- 底部功能按鈕 -->
        <div class="flex flex-col gap-3">
            <button onclick="location.href='cabinet.html'" 
                    class="w-full bg-[#587269] text-white py-3 rounded-xl font-bold shadow-md hover:bg-[#4a6159] transition">
                進入百子櫃配置圖
            </button>
        </div>

    </div>

    <!-- 載入資料中心 -->
    <script src="data.js"></script>
    <script>
        // 1. 強制進入首頁檢查
        if (document.referrer === "" && !window.location.search.includes('dev=true')) {
            window.location.href = "home.html";
        }

        let currentIndex = 0;
        let filteredList = [];

        function updateDisplay() {
            const list = filteredList.length > 0 ? filteredList : medicines;
            const m = list[currentIndex];
            
            if (!m) return;

            document.getElementById('medName').textContent = m.name;
            document.getElementById('medProperty').textContent = m.property;
            document.getElementById('medToxicity').textContent = m.toxicity;
            document.getElementById('medNature').textContent = m.nature;
            document.getElementById('medEffect').textContent = m.effect;
            document.getElementById('medUsage').textContent = m.usage;
            document.getElementById('medNotice').textContent = m.notice;
            document.getElementById('medImage').src = m.img || 'placeholder.png';
            
            document.getElementById('counter').textContent = 
                `${(currentIndex + 1).toString().padStart(2, '0')} / ${list.length.toString().padStart(2, '0')}`;
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.trim();
            if (term === "") {
                filteredList = [];
            } else {
                filteredList = medicines.filter(m => m.name.includes(term));
            }
            currentIndex = 0;
            updateDisplay();
        }

        function nextMed() {
            const list = filteredList.length > 0 ? filteredList : medicines;
            if (currentIndex < list.length - 1) {
                currentIndex++;
                updateDisplay();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function prevMed() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.onload = () => {
            if (typeof medicines !== 'undefined') {
                updateDisplay();
            } else {
                console.error("無法載入 medicines 資料，請檢查 data.js 是否正確引用");
            }
        };
    </script>
</body>
</html>
