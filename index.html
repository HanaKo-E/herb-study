<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中藥學習圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F7F3F0] pb-10">
    <nav class="bg-[#6B5B6B] text-white p-4 text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-widest">中 藥 學 習 圖 鑑</h1>
    </nav>

    <div class="container mx-auto px-4 max-w-md mt-6">
        <div class="flex justify-between items-center mb-4">
            <input type="text" id="search" placeholder="搜尋藥名..." class="border rounded-full px-4 py-2 w-2/3 shadow-sm focus:outline-none focus:ring-2 focus:ring-[#6B5B6B]">
            <div id="counter" class="text-gray-500 font-mono text-sm">01 / 00</div>
        </div>

        <div class="bg-white rounded-3xl p-4 shadow-sm mb-6 flex justify-center items-center h-64 overflow-hidden">
            <img id="medImg" src="" alt="藥材圖片" class="max-h-full object-contain">
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-sm space-y-4 mb-8 text-sm">
            <div class="flex border-b pb-2"><span class="w-20 font-bold text-stone-500">藥名</span><span id="name" class="font-bold text-lg">---</span></div>
            <div class="flex border-b pb-2">
                <div class="w-1/2 flex"><span class="w-20 font-bold text-stone-500">屬性</span><span id="prop">---</span></div>
                <div class="w-1/2 flex"><span class="w-12 font-bold text-stone-500">毒性</span><span id="tox">---</span></div>
            </div>
            <div class="flex flex-col border-b pb-2"><span class="font-bold text-stone-500">性味歸經</span><span id="nature" class="mt-1">---</span></div>
            <div class="flex flex-col border-b pb-2"><span class="font-bold text-stone-500">功效</span><span id="effect" class="mt-1">---</span></div>
            <div class="flex flex-col"><span class="font-bold text-stone-500">使用注意</span><span id="notice" class="mt-1 text-red-700">---</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="changeMed(-1)" class="bg-[#6B5B6B] text-white py-4 rounded-xl font-bold shadow-md active:scale-95">上一個</button>
            <button onclick="changeMed(1)" class="bg-[#6B5B6B] text-white py-4 rounded-xl font-bold shadow-md active:scale-95">下一個</button>
        </div>
        <button onclick="location.href='home.html'" class="w-full mt-6 text-stone-400 underline text-sm">返回首頁</button>
    </div>

    <script src="data.js"></script>
    <script>
        let index = 0;
        function update() {
            const m = medicines[index];
            document.getElementById('name').innerText = m.name;
            document.getElementById('prop').innerText = m.property;
            document.getElementById('tox').innerText = m.toxicity;
            document.getElementById('nature').innerText = m.nature;
            document.getElementById('effect').innerText = m.effect;
            document.getElementById('notice').innerText = m.notice;
            document.getElementById('medImg').src = m.img;
            document.getElementById('counter').innerText = `${(index + 1).toString().padStart(2, '0')} / ${medicines.length}`;
        }
        function changeMed(step) {
            index = (index + step + medicines.length) % medicines.length;
            update();
        }
        window.onload = update;
    </script>
</body>
</html>
